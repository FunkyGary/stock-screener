name: YouTube digest

on:
  schedule:
    # Daily after the US close window; the script only processes new uploads.
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      since_hours:
        description: Look back window in hours
        default: "168"
      max_new:
        description: Maximum new videos to summarize
        default: "3"

concurrency:
  group: youtube-digest
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'openai/gpt-4.1' }}
      YOUTUBE_WHISPER_MODEL: ${{ vars.YOUTUBE_WHISPER_MODEL || 'base' }}
      YOUTUBE_DIGEST_RETENTION_DAYS: "7"
      YOUTUBE_CHANNEL_ID: UCFQsi7WaF5X41tcuOryDk8w
      YOUTUBE_CHANNEL_TITLE: 视野环球财经
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Install audio transcription tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          uv pip install yt-dlp openai-whisper
      - name: Run YouTube digest
        run: >
          uv run python -m screener.youtube_digest
          --since-hours "${{ inputs.since_hours || '168' }}"
          --max-new "${{ inputs.max_new || '3' }}"
          --retention-days "${YOUTUBE_DIGEST_RETENTION_DAYS}"
          --audio-fallback
          --whisper-model "${YOUTUBE_WHISPER_MODEL}"
      - name: Commit digest results (with rebase retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase --autostash
            if [ ! -d data/youtube_digest ]; then
              echo "No digest directory created"
              exit 0
            fi
            git add data/youtube_digest
            if git diff --staged --quiet; then
              echo "No digest changes to commit"
              exit 0
            fi
            git commit -m "data: YouTube digest run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            git reset --soft HEAD~1
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
