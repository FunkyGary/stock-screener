name: TW screener

on:
  schedule:
    # EOD only. Intraday schedules were removed: intraday bars are incomplete,
    # so newly-above-all-MAs / MACD / new-high signals are provisional and can
    # flip by close. The recommendation list must come from the EOD (closed-bar)
    # run; intraday confirmation is a manual step. Use workflow_dispatch (mode:
    # intraday) if an ad-hoc intraday run is ever needed.
    # EOD: chip data settles ~1h after close. 台北 17:17 = 09:17 UTC.
    - cron: "17 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Run mode
        options: [intraday, eod]
        default: eod

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "17 9 * * 1-5" ]; then
            MODE=eod
          else
            MODE="${{ inputs.mode || 'eod' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"
      - name: Run TW screener
        run: uv run python -m screener.run --market tw --mode "${{ steps.mode.outputs.mode }}"
      - name: Commit results (overlay-and-push retry)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stash our generated output outside the worktree so we can re-overlay
          # it after each fetch. This replaces pull-rebase-autostash, whose
          # stash-pop step can leave conflict markers in the JSON when remote
          # touched the same file.
          cp data/latest_signals.json /tmp/our_signals.json
          cp data/tw_target_events.jsonl /tmp/our_tw_target_events.jsonl
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/our_signals.json data/latest_signals.json
            cp /tmp/our_tw_target_events.jsonl data/tw_target_events.jsonl
            git add data/latest_signals.json data/tw_target_events.jsonl
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "data: TW screener ${MODE} run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
