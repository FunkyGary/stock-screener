name: TW screener

on:
  schedule:
    # Intraday: every 30 min during TW session (台北 09:00-13:30) Mon-Fri.
    # Avoid :00/:30 because GitHub scheduled workflows can be delayed or dropped
    # during high-load boundary minutes.
    - cron: "7,37 1-5 * * 1-5"
    # EOD: chip data settles ~1h after close. 台北 17:17 = 09:17 UTC.
    - cron: "17 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Run mode
        options: [intraday, eod]
        default: eod

# Per-market concurrency so a long-running US run never blocks a scheduled
# TW trigger. Cross-market JSON commit conflicts are handled by the
# pull-rebase-retry loop in the commit step below.
concurrency:
  group: tw-screener
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 9 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "17 9 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "*/30 1-5 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "7,37 1-5 * * 1-5" ]; then
            MODE=intraday
          else
            MODE="${{ inputs.mode || 'eod' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"
      - name: Run TW screener
        run: uv run python -m screener.run --market tw --mode "${{ steps.mode.outputs.mode }}"
      - name: Commit results (with rebase retry)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase --autostash
            git add data/latest_signals.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "data: TW screener ${MODE} run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            git reset --soft HEAD~1
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
