name: TW screener

on:
  schedule:
    - cron: "30 6 * * *"  # 06:30 UTC = 14:30 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run TW screener
        run: uv run python -m screener.run --market tw
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_signals.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: TW screener run [skip ci]"
            git push
          fi
