name: US screener

on:
  schedule:
    - cron: "0 22 * * *"  # 22:00 UTC covers both EST (17:00) and EDT (18:00) post-close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run US screener
        run: uv run python -m screener.run --market us
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_signals.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: US screener run [skip ci]"
            git push
          fi
