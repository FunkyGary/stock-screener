name: US screener

on:
  schedule:
    # EOD only. Intraday schedules were removed: intraday bars are incomplete,
    # so newly-above-all-MAs / MACD / new-high signals are provisional and can
    # flip by close. The recommendation list must come from the EOD (closed-bar)
    # run; intraday confirmation is a manual step. Use workflow_dispatch (mode:
    # intraday) if an ad-hoc intraday run is ever needed.
    # EOD: 21:17 UTC = 17:17 EDT / 16:17 EST, after close on both schedules.
    - cron: "17 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Run mode
        options: [intraday, eod]
        default: eod

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "17 21 * * 1-5" ]; then
            MODE=eod
          else
            MODE="${{ inputs.mode || 'eod' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"
      - name: Run US screener
        run: uv run python -m screener.run --market us --mode "${{ steps.mode.outputs.mode }}"
      - name: Commit results (overlay-and-push retry)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stash our generated outputs outside the worktree so we can re-overlay
          # them after each fetch. This replaces pull-rebase-autostash, whose
          # stash-pop step can leave conflict markers in the JSON when remote
          # touched the same files.
          cp data/latest_signals.json /tmp/our_signals.json
          if [ -f data/analyst_target_events.jsonl ]; then
            cp data/analyst_target_events.jsonl /tmp/our_events.jsonl
          fi
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/our_signals.json data/latest_signals.json
            if [ -f /tmp/our_events.jsonl ]; then
              cp /tmp/our_events.jsonl data/analyst_target_events.jsonl
            fi
            git add data/latest_signals.json
            if [ -f data/analyst_target_events.jsonl ]; then
              git add data/analyst_target_events.jsonl
            fi
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "data: US screener ${MODE} run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
