name: US screener

on:
  schedule:
    # Pre-open burst: extra fires in the 30 minutes before the US open.
    # 13:00-13:30 UTC covers EDT open; 14:00-14:30 UTC covers EST open.
    - cron: "2,12,17,27 13,14 * * 1-5"
    # Intraday: every 15 min covering both EDT (13:30-20:00 UTC) and EST
    # (14:30-21:00 UTC). The window 13:00-20:30 UTC catches both; EST will
    # see a few empty pre-open runs which is harmless.
    # 4 fires/hour at offset minutes (avoiding :00/:15/:30/:45 boundaries
    # because GitHub drops boundary-minute fires under load).
    - cron: "7,22,37,52 13-20 * * 1-5"
    # EOD: 21:17 UTC = 17:17 EDT / 16:17 EST, after close on both schedules.
    - cron: "17 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Run mode
        options: [intraday, eod]
        default: eod

# Shared concurrency across TW and US: both workflows write the same
# data/latest_signals.json, so when GitHub delays one run into the other's
# window (it happens) pull-rebase-autostash can leave conflict markers in
# the JSON. Serialize all screener runs to eliminate that race.
concurrency:
  group: screener
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "17 21 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "*/30 13-20 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "7,37 13-20 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "2,12,17,27 13,14 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "7,22,37,52 13-20 * * 1-5" ]; then
            MODE=intraday
          else
            MODE="${{ inputs.mode || 'eod' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"
      - name: Run US screener
        run: uv run python -m screener.run --market us --mode "${{ steps.mode.outputs.mode }}"
      - name: Commit results (overlay-and-push retry)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stash our generated outputs outside the worktree so we can re-overlay
          # them after each fetch. This replaces pull-rebase-autostash, whose
          # stash-pop step can leave conflict markers in the JSON when remote
          # touched the same files.
          cp data/latest_signals.json /tmp/our_signals.json
          if [ -f data/analyst_target_events.jsonl ]; then
            cp data/analyst_target_events.jsonl /tmp/our_events.jsonl
          fi
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/our_signals.json data/latest_signals.json
            if [ -f /tmp/our_events.jsonl ]; then
              cp /tmp/our_events.jsonl data/analyst_target_events.jsonl
            fi
            git add data/latest_signals.json
            if [ -f data/analyst_target_events.jsonl ]; then
              git add data/analyst_target_events.jsonl
            fi
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "data: US screener ${MODE} run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
