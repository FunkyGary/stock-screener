name: US screener

on:
  schedule:
    # Intraday: every 30 min covering both EDT (13:30-20:00 UTC) and EST
    # (14:30-21:00 UTC). The window 13:00-20:30 UTC catches both; EST will
    # see a few empty pre-open runs which is harmless.
    # Avoid :00/:30 because GitHub scheduled workflows can be delayed or dropped
    # during high-load boundary minutes (US open at 13:30 UTC was being missed
    # 2-3 hours late).
    - cron: "7,37 13-20 * * 1-5"
    # Open guarantee: extra fire shortly after EDT open (13:30 UTC) and EST
    # open (14:30 UTC) in case the regular 7,37 fires get dropped under load.
    - cron: "33 13,14 * * 1-5"
    # EOD: 21:17 UTC = 17:17 EDT / 16:17 EST, after close on both schedules.
    - cron: "17 21 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        description: Run mode
        options: [intraday, eod]
        default: eod

# Per-market concurrency. JSON commit conflicts (rare, since TW and US
# session windows don't overlap) are handled by pull-rebase-retry below.
concurrency:
  group: us-screener
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 21 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "17 21 * * 1-5" ]; then
            MODE=eod
          elif [ "${{ github.event.schedule }}" = "*/30 13-20 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "7,37 13-20 * * 1-5" ]; then
            MODE=intraday
          elif [ "${{ github.event.schedule }}" = "33 13,14 * * 1-5" ]; then
            MODE=intraday
          else
            MODE="${{ inputs.mode || 'eod' }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: $MODE"
      - name: Run US screener
        run: uv run python -m screener.run --market us --mode "${{ steps.mode.outputs.mode }}"
      - name: Commit results (with rebase retry)
        env:
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git pull --rebase --autostash
            git add data/latest_signals.json
            if [ -f data/analyst_target_events.jsonl ]; then
              git add data/analyst_target_events.jsonl
            fi
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "data: US screener ${MODE} run [skip ci]"
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt; backing off"
            git reset --soft HEAD~1
            sleep $((attempt * 3))
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1
